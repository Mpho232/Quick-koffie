<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Koffiee - Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <figure>
            <img src="images/logo.png" alt="Quick Koffiee Logo" width="150" height="150">
            <figcaption>Quick Koffiee Official Logo</figcaption>
        </figure>
        
        <h1>Quick Koffiee</h1>
        <p class="motto">*Rich, fresh, and satisfying coffee experiences every day.*</p>
        
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h2>Your Selected Orders</h2>
            <p style="margin-bottom: 2rem;">Review your items below before finalizing your neighborhood brew pickup.</p>
            
            <section id="cart-items-list">
                </section>

            <h3 style="margin-top: 2rem; font-size: 1.8rem; border-top: 2px dashed #fff; padding-top: 1.5rem;">
                Total Cost: <span id="cart-total-price" style="color: #e8c595;">$0.00</span>
            </h3>

            <button onclick="clearCart()" class="cta-btn" style="border: none; cursor: pointer; margin-top: 1.5rem; background-color: #4a2c11; color: #fff; width: 100%;">Clear Cart</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Quick Koffiee. All Rights Reserved.</p>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
